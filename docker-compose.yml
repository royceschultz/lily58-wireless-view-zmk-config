services:
  firmware:
    build: .
    volumes:
      - ./config:/workspace/config
      - ./output:/workspace/output
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        west update
        west zephyr-export

        # Build left half
        echo "=== Building left half ==="
        west build -s zmk/app -p -d build/left -b nice_nano_v2 -- \
          -DSHIELD="lily58_left nice_view_adapter nice_view_gem" \
          -DZMK_CONFIG=/workspace/config \
          -DSNIPPET="studio-rpc-usb-uart"

        # Build right half
        echo "=== Building right half ==="
        west build -s zmk/app -p -d build/right -b nice_nano_v2 -- \
          -DSHIELD="lily58_right nice_view_adapter nice_view_gem" \
          -DZMK_CONFIG=/workspace/config

        # Copy firmware to output
        mkdir -p /workspace/output
        cp build/left/zephyr/zmk.uf2 /workspace/output/lily58_left-nice_nano_v2.uf2
        cp build/right/zephyr/zmk.uf2 /workspace/output/lily58_right-nice_nano_v2.uf2

        echo "=== Done! Firmware files in ./output/ ==="
